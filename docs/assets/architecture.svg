<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="100%">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="480" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="500" y="38" font-family="'Courier New', Courier, monospace" font-size="15" font-weight="bold"
        fill="#e2e8f0" text-anchor="middle" letter-spacing="2">SYSTEM ARCHITECTURE</text>
  <line x1="200" y1="48" x2="800" y2="48" stroke="#1e293b" stroke-width="1"/>

  <!-- ===================== ZONE: BROWSER ===================== -->
  <rect x="30" y="65" width="210" height="380" rx="10" fill="#0d1b2e" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="135" y="88" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold"
        fill="#38bdf8" text-anchor="middle" letter-spacing="1">BROWSER</text>

  <!-- UI Form -->
  <rect x="50" y="100" width="170" height="60" rx="8" fill="#0f2d4a" stroke="#1e4a7a" stroke-width="1"/>
  <text x="135" y="124" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Form UI</text>
  <text x="135" y="142" font-family="'Courier New', Courier, monospace" font-size="10" fill="#64748b" text-anchor="middle">topic · theme · slides</text>

  <!-- Viewer -->
  <rect x="50" y="200" width="170" height="60" rx="8" fill="#0f2d4a" stroke="#1e4a7a" stroke-width="1"/>
  <text x="135" y="224" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Slide Viewer</text>
  <text x="135" y="242" font-family="'Courier New', Courier, monospace" font-size="10" fill="#64748b" text-anchor="middle">render · nav · notes</text>

  <!-- PDF Export -->
  <rect x="50" y="305" width="170" height="60" rx="8" fill="#0f2d4a" stroke="#1e4a7a" stroke-width="1"/>
  <text x="135" y="329" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="bold" fill="#e2e8f0" text-anchor="middle">PDF Exporter</text>
  <text x="135" y="347" font-family="'Courier New', Courier, monospace" font-size="10" fill="#64748b" text-anchor="middle">html2canvas · jsPDF</text>

  <!-- Internal browser arrows -->
  <line x1="135" y1="160" x2="135" y2="192" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arr-blue)"/>
  <line x1="135" y1="260" x2="135" y2="297" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arr-blue)"/>

  <!-- ===================== ZONE: SERVER ===================== -->
  <rect x="300" y="65" width="400" height="380" rx="10" fill="#12101f" stroke="#2d1b69" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="500" y="88" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold"
        fill="#a78bfa" text-anchor="middle" letter-spacing="1">EXPRESS SERVER  (server.js)</text>

  <!-- sanitizeText -->
  <rect x="320" y="100" width="160" height="52" rx="8" fill="#1a0f3a" stroke="#3b2a6e" stroke-width="1"/>
  <text x="400" y="121" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">sanitizeText()</text>
  <text x="400" y="139" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">strip HTML · clamp ranges</text>

  <!-- buildSystemPrompt -->
  <rect x="320" y="175" width="160" height="52" rx="8" fill="#1a0f3a" stroke="#3b2a6e" stroke-width="1"/>
  <text x="400" y="196" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">buildSystemPrompt()</text>
  <text x="400" y="214" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">theme tokens · density rules</text>

  <!-- Groq SDK call -->
  <rect x="320" y="250" width="160" height="52" rx="8" fill="#1a0f3a" stroke="#3b2a6e" stroke-width="1"/>
  <text x="400" y="271" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Groq SDK</text>
  <text x="400" y="289" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">llama-3.1-8b-instant · 8192t</text>

  <!-- validateSVG -->
  <rect x="320" y="325" width="160" height="52" rx="8" fill="#1a0f3a" stroke="#3b2a6e" stroke-width="1"/>
  <text x="400" y="346" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">validateSVG()</text>
  <text x="400" y="364" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">reject &lt;script&gt; · on* attrs</text>

  <!-- buildSVG -->
  <rect x="510" y="250" width="160" height="52" rx="8" fill="#1a0f3a" stroke="#3b2a6e" stroke-width="1"/>
  <text x="590" y="271" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">buildSVG()</text>
  <text x="590" y="289" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">local fallback charts</text>

  <!-- Internal server arrows -->
  <line x1="400" y1="152" x2="400" y2="167" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="400" y1="227" x2="400" y2="242" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="400" y1="302" x2="400" y2="317" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- Groq SDK → buildSVG -->
  <line x1="480" y1="272" x2="502" y2="272" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arr-purple)"/>
  <!-- buildSVG → validateSVG merge -->
  <line x1="590" y1="302" x2="590" y2="351" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="590" y1="351" x2="488" y2="351" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arr-purple)"/>

  <!-- ===================== ZONE: GROQ ===================== -->
  <rect x="760" y="65" width="210" height="180" rx="10" fill="#0d1f17" stroke="#14532d" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="865" y="88" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold"
        fill="#4ade80" text-anchor="middle" letter-spacing="1">GROQ CLOUD</text>

  <rect x="780" y="100" width="170" height="60" rx="8" fill="#0a2417" stroke="#166534" stroke-width="1"/>
  <text x="865" y="124" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Llama 3.1 8B</text>
  <text x="865" y="142" font-family="'Courier New', Courier, monospace" font-size="10" fill="#64748b" text-anchor="middle">Instant · JSON mode</text>

  <rect x="780" y="178" width="170" height="46" rx="8" fill="#0a2417" stroke="#166534" stroke-width="1"/>
  <text x="865" y="196" font-family="'Courier New', Courier, monospace" font-size="11" fill="#4ade80" text-anchor="middle">~1–3s inference</text>
  <text x="865" y="213" font-family="'Courier New', Courier, monospace" font-size="10" fill="#64748b" text-anchor="middle">free tier · REST API</text>

  <!-- ===================== MAIN FLOW ARROWS ===================== -->

  <!-- Browser Form → Server (POST) -->
  <line x1="220" y1="130" x2="292" y2="130" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="225" y="113" width="62" height="16" rx="3" fill="#0f172a"/>
  <text x="256" y="124" font-family="'Courier New', Courier, monospace" font-size="9" fill="#94a3b8" text-anchor="middle">POST /api/generate</text>

  <!-- Server → Groq -->
  <line x1="700" y1="145" x2="772" y2="145" stroke="#4ade80" stroke-width="1.8" marker-end="url(#arr-green)"/>
  <rect x="705" y="128" width="62" height="16" rx="3" fill="#0f172a"/>
  <text x="736" y="139" font-family="'Courier New', Courier, monospace" font-size="9" fill="#4ade80" text-anchor="middle">REST · HTTPS</text>

  <!-- Groq → Server (return) -->
  <line x1="772" y1="175" x2="700" y2="175" stroke="#4ade80" stroke-width="1.8" stroke-dasharray="5 2" marker-end="url(#arr-green)"/>
  <rect x="705" y="158" width="62" height="16" rx="3" fill="#0f172a"/>
  <text x="736" y="169" font-family="'Courier New', Courier, monospace" font-size="9" fill="#4ade80" text-anchor="middle">JSON slides[]</text>

  <!-- Server → Browser (response) -->
  <line x1="292" y1="165" x2="220" y2="165" stroke="#64748b" stroke-width="1.8" stroke-dasharray="5 2" marker-end="url(#arr)"/>
  <rect x="225" y="148" width="62" height="16" rx="3" fill="#0f172a"/>
  <text x="256" y="159" font-family="'Courier New', Courier, monospace" font-size="9" fill="#94a3b8" text-anchor="middle">validated deck</text>

  <!-- Legend -->
  <rect x="30" y="458" width="940" height="1" fill="#1e293b"/>
  <text x="30" y="474" font-family="'Courier New', Courier, monospace" font-size="10" fill="#475569">── request flow</text>
  <text x="160" y="474" font-family="'Courier New', Courier, monospace" font-size="10" fill="#475569">- - response flow</text>
  <text x="300" y="474" font-family="'Courier New', Courier, monospace" font-size="10" fill="#475569">green = external API</text>
  <text x="440" y="474" font-family="'Courier New', Courier, monospace" font-size="10" fill="#475569">purple = internal pipeline</text>
  <text x="620" y="474" font-family="'Courier New', Courier, monospace" font-size="10" fill="#475569">blue = browser internal</text>
</svg>

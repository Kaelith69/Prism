<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="100%">
  <!-- Defs for arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b6b6b" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b88cc" />
    </marker>
  </defs>

  <rect width="900" height="400" fill="#ffffff"/>

  <!-- ZONE: Frontend -->
  <rect x="50" y="50" width="220" height="280" fill="#f4f1ec" stroke="#d4d0c8" stroke-width="2" stroke-dasharray="6 4" rx="8"/>
  <text x="60" y="70" font-family="system-ui, -apple-system, monospace" font-size="13" font-weight="bold" fill="#6b6b6b">Frontend (Browser)</text>

  <rect x="70" y="130" width="180" height="60" fill="#ffffff" stroke="#c4c0b6" stroke-width="1" rx="8"/>
  <text x="160" y="155" font-family="system-ui, -apple-system, monospace" font-size="14" font-weight="bold" fill="#1a1a2e" text-anchor="middle">index_v2.html</text>
  <text x="160" y="175" font-family="system-ui, -apple-system, monospace" font-size="12" fill="#6b6b6b" text-anchor="middle">UI &amp; PDF Canvas Export</text>

  <!-- ZONE: Backend -->
  <rect x="360" y="50" width="220" height="280" fill="#e6f2ff" stroke="#a0c8e6" stroke-width="2" stroke-dasharray="6 4" rx="8"/>
  <text x="370" y="70" font-family="system-ui, -apple-system, monospace" font-size="13" font-weight="bold" fill="#4a7a9a">Backend (Node.js/Express)</text>
  
  <rect x="380" y="130" width="180" height="60" fill="#ffffff" stroke="#a0c8e6" stroke-width="1" rx="8"/>
  <text x="470" y="155" font-family="system-ui, -apple-system, monospace" font-size="14" font-weight="bold" fill="#1a1a2e" text-anchor="middle">server.js</text>
  <text x="470" y="175" font-family="system-ui, -apple-system, monospace" font-size="12" fill="#6b6b6b" text-anchor="middle">Core API routing logic</text>

  <rect x="380" y="220" width="180" height="60" fill="#ffffff" stroke="#a0c8e6" stroke-width="1" rx="8"/>
  <text x="470" y="245" font-family="system-ui, -apple-system, monospace" font-size="14" font-weight="bold" fill="#1a1a2e" text-anchor="middle">Prompt Injector</text>
  <text x="470" y="265" font-family="system-ui, -apple-system, monospace" font-size="12" fill="#6b6b6b" text-anchor="middle">Guards bounds &amp; SVGs</text>

  <!-- ZONE: External/LLM -->
  <rect x="670" y="50" width="180" height="280" fill="#f8edf8" stroke="#dcb4dc" stroke-width="2" stroke-dasharray="6 4" rx="8"/>
  <text x="680" y="70" font-family="system-ui, -apple-system, monospace" font-size="13" font-weight="bold" fill="#7a4a7a">Third-Party APIs</text>
  
  <rect x="690" y="130" width="140" height="60" fill="#ffffff" stroke="#dcb4dc" stroke-width="1" rx="8"/>
  <text x="760" y="155" font-family="system-ui, -apple-system, monospace" font-size="14" font-weight="bold" fill="#1a1a2e" text-anchor="middle">Groq LLama 3.1 8B</text>
  <text x="760" y="175" font-family="system-ui, -apple-system, monospace" font-size="12" fill="#6b6b6b" text-anchor="middle">High speed inference</text>

  <!-- Flow Lines -->
  <!-- Browser to Server -->
  <line x1="250" y1="150" x2="370" y2="150" stroke="#6b6b6b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="310" y="140" font-family="system-ui, -apple-system, monospace" font-size="12" fill="#3a3a3a" text-anchor="middle">POST /api/generate</text>

  <!-- Server to Groq -->
  <line x1="560" y1="140" x2="680" y2="140" stroke="#4b88cc" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="620" y="130" font-family="system-ui, -apple-system, monospace" font-size="12" fill="#4a7a9a" text-anchor="middle">REST HTTP</text>

  <!-- Groq to Server -->
  <line x1="680" y1="170" x2="560" y2="170" stroke="#4b88cc" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="620" y="185" font-family="system-ui, -apple-system, monospace" font-size="12" fill="#4a7a9a" text-anchor="middle">JSON Schema</text>

  <!-- Server to Generator -->
  <line x1="470" y1="190" x2="470" y2="210" stroke="#6b6b6b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="210" x2="450" y2="190" stroke="#6b6b6b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Server to Browser -->
  <line x1="370" y1="170" x2="250" y2="170" stroke="#6b6b6b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="310" y="185" font-family="system-ui, -apple-system, monospace" font-size="12" fill="#3a3a3a" text-anchor="middle">Payload Transfer</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="100%">
  <defs>
    <pattern id="arch-dots" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1.6" fill="#f5c800" opacity="0.4"/>
    </pattern>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#000" flood-opacity="1"/>
    </filter>
    <marker id="comic-arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#000" stroke="#000" stroke-width="1"/>
    </marker>
  </defs>

  <!-- BG -->
  <rect width="1000" height="520" fill="#fffde7"/>
  <rect width="1000" height="520" fill="url(#arch-dots)"/>
  <rect x="5" y="5" width="990" height="510" fill="none" stroke="#000" stroke-width="5" rx="3"/>

  <!-- Title panel -->
  <rect x="5" y="5" width="990" height="52" fill="#000" stroke="#000" stroke-width="4"/>
  <text x="500" y="38" font-family="'Arial Black', Impact, sans-serif" font-size="22" font-weight="900"
        fill="#f5c800" text-anchor="middle" letter-spacing="5">⚡ SYSTEM ARCHITECTURE ⚡</text>

  <!-- ========= PANEL 1: BROWSER ========= -->
  <rect x="20" y="76" width="260" height="412" fill="#e3f2fd" stroke="#000" stroke-width="4" rx="4"/>

  <!-- Panel header -->
  <rect x="20" y="76" width="260" height="42" fill="#00bcd4" stroke="#000" stroke-width="4" rx="3"/>
  <text x="150" y="103" font-family="'Arial Black', Impact, sans-serif" font-size="17" font-weight="900"
        fill="#000" text-anchor="middle" letter-spacing="2">BROWSER</text>

  <!-- Form UI box -->
  <rect x="38" y="136" width="224" height="90" fill="#fff" stroke="#000" stroke-width="3.5" rx="6" filter="url(#shadow)"/>
  <rect x="38" y="136" width="224" height="28" fill="#00bcd4" stroke="#000" stroke-width="3" rx="5"/>
  <text x="150" y="154" font-family="'Arial Black', Impact, sans-serif" font-size="13" font-weight="900" fill="#000" text-anchor="middle">Form UI</text>
  <text x="150" y="185" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">topic · theme · slide count</text>
  <text x="150" y="203" font-family="Arial, sans-serif" font-size="11" fill="#555" text-anchor="middle">context · min/max</text>

  <!-- Speech bubble from form -->
  <rect x="60" y="242" width="180" height="36" rx="18" fill="#f5c800" stroke="#000" stroke-width="2.5" filter="url(#shadow)"/>
  <polygon points="93,278 80,296 106,278" fill="#f5c800" stroke="#000" stroke-width="2"/>
  <text x="150" y="265" font-family="'Arial Black', Impact, sans-serif" font-size="11" font-weight="900" fill="#000" text-anchor="middle">generate() fires!</text>

  <!-- Slide Viewer box -->
  <rect x="38" y="308" width="224" height="90" fill="#fff" stroke="#000" stroke-width="3.5" rx="6" filter="url(#shadow)"/>
  <rect x="38" y="308" width="224" height="28" fill="#00bcd4" stroke="#000" stroke-width="3" rx="5"/>
  <text x="150" y="326" font-family="'Arial Black', Impact, sans-serif" font-size="13" font-weight="900" fill="#000" text-anchor="middle">Slide Viewer</text>
  <text x="150" y="358" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">render · nav · notes</text>
  <text x="150" y="376" font-family="Arial, sans-serif" font-size="11" fill="#555" text-anchor="middle">html2canvas · jsPDF</text>

  <!-- PDF label -->
  <rect x="55" y="415" width="192" height="56" fill="#ff5722" stroke="#000" stroke-width="3" rx="6" filter="url(#shadow)"/>
  <text x="151" y="440" font-family="'Arial Black', Impact, sans-serif" font-size="13" font-weight="900" fill="#fff" text-anchor="middle">PDF EXPORT</text>
  <text x="151" y="460" font-family="Arial, sans-serif" font-size="10" fill="#ffe0d0" text-anchor="middle">13.33 × 7.5 in · 2× scale</text>

  <!-- ========= PANEL 2: SERVER ========= -->
  <rect x="302" y="76" width="380" height="412" fill="#f3e5f5" stroke="#000" stroke-width="4" rx="4"/>
  <rect x="302" y="76" width="380" height="42" fill="#9c27b0" stroke="#000" stroke-width="4" rx="3"/>
  <text x="492" y="103" font-family="'Arial Black', Impact, sans-serif" font-size="17" font-weight="900"
        fill="#fff" text-anchor="middle" letter-spacing="2">EXPRESS  SERVER</text>

  <!-- POW badge -->
  <polygon points="492,128 504,150 528,148 512,164 520,188 496,176 480,192 480,168 458,158 480,148"
           fill="#e8001c" stroke="#000" stroke-width="3"/>
  <text x="492" y="168" font-family="'Arial Black', Impact, sans-serif" font-size="14" font-weight="900"
        fill="#fff" text-anchor="middle" transform="rotate(-8,492,168)">POW!</text>

  <!-- sanitizeText -->
  <rect x="318" y="204" width="162" height="70" fill="#fff" stroke="#000" stroke-width="3.5" rx="6" filter="url(#shadow)"/>
  <rect x="318" y="204" width="162" height="26" fill="#673ab7" stroke="#000" stroke-width="3" rx="5"/>
  <text x="399" y="221" font-family="'Arial Black', Impact, sans-serif" font-size="11" font-weight="900" fill="#fff" text-anchor="middle">sanitizeText()</text>
  <text x="399" y="248" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">strip HTML · clamp</text>
  <text x="399" y="263" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">slides [3..32]</text>

  <!-- buildSystemPrompt -->
  <rect x="502" y="204" width="162" height="70" fill="#fff" stroke="#000" stroke-width="3.5" rx="6" filter="url(#shadow)"/>
  <rect x="502" y="204" width="162" height="26" fill="#673ab7" stroke="#000" stroke-width="3" rx="5"/>
  <text x="583" y="221" font-family="'Arial Black', Impact, sans-serif" font-size="10" font-weight="900" fill="#fff" text-anchor="middle">buildSystemPrompt()</text>
  <text x="583" y="248" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">theme tokens ·</text>
  <text x="583" y="263" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">26-topic template</text>

  <!-- validateSVG -->
  <rect x="318" y="298" width="162" height="70" fill="#fff" stroke="#000" stroke-width="3.5" rx="6" filter="url(#shadow)"/>
  <rect x="318" y="298" width="162" height="26" fill="#673ab7" stroke="#000" stroke-width="3" rx="5"/>
  <text x="399" y="315" font-family="'Arial Black', Impact, sans-serif" font-size="11" font-weight="900" fill="#fff" text-anchor="middle">validateSVG()</text>
  <text x="399" y="342" font-family="Arial, sans-serif" font-size="10" fill="#e8001c" text-anchor="middle">reject &lt;script&gt;</text>
  <text x="399" y="357" font-family="Arial, sans-serif" font-size="10" fill="#e8001c" text-anchor="middle">reject on* attrs</text>

  <!-- buildSVG -->
  <rect x="502" y="298" width="162" height="70" fill="#fff" stroke="#000" stroke-width="3.5" rx="6" filter="url(#shadow)"/>
  <rect x="502" y="298" width="162" height="26" fill="#673ab7" stroke="#000" stroke-width="3" rx="5"/>
  <text x="583" y="315" font-family="'Arial Black', Impact, sans-serif" font-size="11" font-weight="900" fill="#fff" text-anchor="middle">buildSVG()</text>
  <text x="583" y="342" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">fallback charts</text>
  <text x="583" y="357" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">if LLM SVG fails</text>

  <!-- Groq SDK in server -->
  <rect x="348" y="392" width="288" height="70" fill="#000" stroke="#000" stroke-width="3.5" rx="6" filter="url(#shadow)"/>
  <text x="492" y="422" font-family="'Arial Black', Impact, sans-serif" font-size="14" font-weight="900" fill="#f5c800" text-anchor="middle">Groq SDK call</text>
  <text x="492" y="446" font-family="Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">llama-3.1-8b-instant · 8192 tokens</text>

  <!-- Internal server arrows -->
  <line x1="399" y1="274" x2="399" y2="292" stroke="#000" stroke-width="2.5" marker-end="url(#comic-arr)"/>
  <line x1="583" y1="274" x2="583" y2="292" stroke="#000" stroke-width="2.5" marker-end="url(#comic-arr)"/>
  <line x1="399" y1="368" x2="430" y2="386" stroke="#000" stroke-width="2.5" marker-end="url(#comic-arr)"/>
  <line x1="583" y1="368" x2="554" y2="386" stroke="#000" stroke-width="2.5" marker-end="url(#comic-arr)"/>
  <!-- sanitize → buildPrompt -->
  <line x1="480" y1="240" x2="500" y2="240" stroke="#000" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#comic-arr)"/>

  <!-- ========= PANEL 3: GROQ ========= -->
  <rect x="704" y="76" width="274" height="412" fill="#e8f5e9" stroke="#000" stroke-width="4" rx="4"/>
  <rect x="704" y="76" width="274" height="42" fill="#4caf50" stroke="#000" stroke-width="4" rx="3"/>
  <text x="841" y="103" font-family="'Arial Black', Impact, sans-serif" font-size="17" font-weight="900"
        fill="#000" text-anchor="middle" letter-spacing="2">GROQ CLOUD</text>

  <!-- Lightning bolts decoration -->
  <text x="726" y="160" font-family="Arial" font-size="32" fill="#f5c800" stroke="#000" stroke-width="1.5" paint-order="stroke">⚡</text>
  <text x="900" y="160" font-family="Arial" font-size="32" fill="#f5c800" stroke="#000" stroke-width="1.5" paint-order="stroke">⚡</text>

  <!-- Llama box -->
  <rect x="720" y="178" width="242" height="80" fill="#fff" stroke="#000" stroke-width="3.5" rx="6" filter="url(#shadow)"/>
  <rect x="720" y="178" width="242" height="28" fill="#2e7d32" stroke="#000" stroke-width="3" rx="5"/>
  <text x="841" y="196" font-family="'Arial Black', Impact, sans-serif" font-size="13" font-weight="900" fill="#fff" text-anchor="middle">Llama 3.1 8B Instant</text>
  <text x="841" y="225" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">JSON schema · structured</text>
  <text x="841" y="242" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32" text-anchor="middle">free tier · REST API</text>

  <!-- Speed badge -->
  <rect x="735" y="282" width="212" height="50" fill="#f5c800" stroke="#000" stroke-width="3" rx="6" filter="url(#shadow)"/>
  <text x="841" y="305" font-family="'Arial Black', Impact, sans-serif" font-size="17" font-weight="900" fill="#000" text-anchor="middle">~1–3s 🔥</text>
  <text x="841" y="322" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">faster than you can blink</text>

  <!-- Comic thought bubble from Groq -->
  <circle cx="800" cy="370" r="10" fill="#fff" stroke="#000" stroke-width="2"/>
  <circle cx="820" cy="358" r="8" fill="#fff" stroke="#000" stroke-width="2"/>
  <circle cx="841" cy="348" r="7" fill="#fff" stroke="#000" stroke-width="2"/>
  <rect x="760" y="295" width="160" height="44" rx="10" fill="#fff" stroke="#000" stroke-width="2.5"/>
  <text x="841" y="316" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle" font-style="italic">"here's your JSON,</text>
  <text x="841" y="330" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle" font-style="italic">no hallucinations today"</text>

  <!-- ========= INTER-PANEL ARROWS ========= -->
  <!-- Browser → Server: POST -->
  <line x1="280" y1="230" x2="296" y2="230" stroke="#000" stroke-width="3.5" marker-end="url(#comic-arr)"/>
  <rect x="254" y="175" width="68" height="50" fill="#e8001c" stroke="#000" stroke-width="2.5" rx="4" transform="rotate(-3,288,200)" filter="url(#shadow)"/>
  <text x="288" y="197" font-family="'Arial Black', Impact, sans-serif" font-size="9" font-weight="900" fill="#fff" text-anchor="middle" transform="rotate(-3,288,197)">POST</text>
  <text x="288" y="211" font-family="'Arial Black', Impact, sans-serif" font-size="8" fill="#ffe0d0" text-anchor="middle" transform="rotate(-3,288,211)">/api/generate</text>

  <!-- Server → Browser: response -->
  <line x1="296" y1="270" x2="280" y2="270" stroke="#000" stroke-width="3.5" stroke-dasharray="6 3" marker-end="url(#comic-arr)"/>
  <rect x="246" y="276" width="72" height="36" fill="#00bcd4" stroke="#000" stroke-width="2.5" rx="4" filter="url(#shadow)"/>
  <text x="282" y="291" font-family="'Arial Black', Impact, sans-serif" font-size="9" font-weight="900" fill="#000" text-anchor="middle">validated</text>
  <text x="282" y="303" font-family="'Arial Black', Impact, sans-serif" font-size="9" fill="#000" text-anchor="middle">deck ✓</text>

  <!-- Server → Groq -->
  <line x1="682" y1="430" x2="698" y2="430" stroke="#000" stroke-width="3.5" marker-end="url(#comic-arr)"/>
  <rect x="652" y="404" width="66" height="44" fill="#4caf50" stroke="#000" stroke-width="2.5" rx="4" filter="url(#shadow)"/>
  <text x="685" y="422" font-family="'Arial Black', Impact, sans-serif" font-size="9" font-weight="900" fill="#fff" text-anchor="middle">HTTPS</text>
  <text x="685" y="438" font-family="'Arial Black', Impact, sans-serif" font-size="8" fill="#e8f5e9" text-anchor="middle">prompt →</text>

  <!-- Groq → Server -->
  <line x1="698" y1="450" x2="682" y2="450" stroke="#000" stroke-width="3.5" stroke-dasharray="6 3" marker-end="url(#comic-arr)"/>
  <text x="690" y="468" font-family="'Arial Black', Impact, sans-serif" font-size="8" fill="#000" text-anchor="middle">← JSON</text>

  <!-- Panel dividers -->
  <line x1="302" y1="76" x2="302" y2="488" stroke="#000" stroke-width="4"/>
  <line x1="704" y1="76" x2="704" y2="488" stroke="#000" stroke-width="4"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" width="100%">
  <defs>
    <pattern id="flow-dots" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1.5" fill="#e8001c" opacity="0.18"/>
    </pattern>
    <filter id="fshadow">
      <feDropShadow dx="4" dy="4" stdDeviation="0" flood-color="#000" flood-opacity="1"/>
    </filter>
    <marker id="fat-arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#000"/>
    </marker>
    <marker id="red-arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#e8001c"/>
    </marker>
  </defs>

  <!-- BG -->
  <rect width="1000" height="560" fill="#fff9c4"/>
  <rect width="1000" height="560" fill="url(#flow-dots)"/>
  <rect x="5" y="5" width="990" height="550" fill="none" stroke="#000" stroke-width="5" rx="3"/>

  <!-- Header bar -->
  <rect x="5" y="5" width="990" height="52" fill="#e8001c" stroke="#000" stroke-width="4"/>
  <text x="500" y="38" font-family="'Arial Black', Impact, sans-serif" font-size="22" font-weight="900"
        fill="#fff" text-anchor="middle" letter-spacing="5">💥 DATA FLOW — 11 STEPS 💥</text>

  <!-- ======== ROW 1: Steps 1-4 ======== -->
  <!-- Step 1 -->
  <rect x="20" y="80" width="190" height="110" fill="#fff" stroke="#000" stroke-width="4" rx="6" filter="url(#fshadow)"/>
  <rect x="20" y="80" width="190" height="34" fill="#00bcd4" stroke="#000" stroke-width="3.5" rx="5"/>
  <circle cx="44" cy="97" r="12" fill="#000"/>
  <text x="44" y="102" font-family="'Arial Black', Impact, sans-serif" font-size="13" fill="#f5c800" text-anchor="middle">1</text>
  <text x="118" y="101" font-family="'Arial Black', Impact, sans-serif" font-size="12" font-weight="900" fill="#000" text-anchor="middle">User Input</text>
  <text x="115" y="134" font-family="Arial, sans-serif" font-size="10.5" fill="#333" text-anchor="middle">topic · theme</text>
  <text x="115" y="150" font-family="Arial, sans-serif" font-size="10.5" fill="#333" text-anchor="middle">slide count · context</text>
  <text x="115" y="168" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">author (optional)</text>

  <!-- step 1→2 arrow -->
  <line x1="210" y1="135" x2="238" y2="135" stroke="#000" stroke-width="3.5" marker-end="url(#fat-arr)"/>

  <!-- Step 2 -->
  <rect x="240" y="80" width="190" height="110" fill="#fff" stroke="#000" stroke-width="4" rx="6" filter="url(#fshadow)"/>
  <rect x="240" y="80" width="190" height="34" fill="#00bcd4" stroke="#000" stroke-width="3.5" rx="5"/>
  <circle cx="264" cy="97" r="12" fill="#000"/>
  <text x="264" y="102" font-family="'Arial Black', Impact, sans-serif" font-size="13" fill="#f5c800" text-anchor="middle">2</text>
  <text x="338" y="101" font-family="'Arial Black', Impact, sans-serif" font-size="12" font-weight="900" fill="#000" text-anchor="middle">Client Validate</text>
  <text x="335" y="134" font-family="Arial, sans-serif" font-size="10.5" fill="#333" text-anchor="middle">title required</text>
  <text x="335" y="150" font-family="Arial, sans-serif" font-size="10.5" fill="#333" text-anchor="middle">min ≤ max check</text>
  <text x="335" y="168" font-family="Arial, sans-serif" font-size="10" fill="#e8001c" text-anchor="middle">red border if invalid</text>

  <!-- Rejection speech bubble down from step 2 -->
  <rect x="245" y="205" width="180" height="45" rx="8" fill="#e8001c" stroke="#000" stroke-width="3" filter="url(#fshadow)"/>
  <polygon points="310,205 298,186 326,205" fill="#e8001c" stroke="#000" stroke-width="2.5"/>
  <text x="335" y="225" font-family="'Arial Black', Impact, sans-serif" font-size="11" font-weight="900" fill="#fff" text-anchor="middle">NOPE! BLOCKED.</text>
  <text x="335" y="241" font-family="Arial, sans-serif" font-size="10" fill="#ffe" text-anchor="middle">no request sent →</text>

  <!-- step 2→3 arrow -->
  <line x1="430" y1="135" x2="458" y2="135" stroke="#000" stroke-width="3.5" marker-end="url(#fat-arr)"/>
  <rect x="426" y="118" width="36" height="18" rx="4" fill="#4caf50" stroke="#000" stroke-width="2"/>
  <text x="444" y="130" font-family="'Arial Black', Impact, sans-serif" font-size="9" fill="#fff" text-anchor="middle">valid!</text>

  <!-- Step 3 -->
  <rect x="460" y="80" width="190" height="110" fill="#fff" stroke="#000" stroke-width="4" rx="6" filter="url(#fshadow)"/>
  <rect x="460" y="80" width="190" height="34" fill="#9c27b0" stroke="#000" stroke-width="3.5" rx="5"/>
  <circle cx="484" cy="97" r="12" fill="#000"/>
  <text x="484" y="102" font-family="'Arial Black', Impact, sans-serif" font-size="13" fill="#f5c800" text-anchor="middle">3</text>
  <text x="558" y="101" font-family="'Arial Black', Impact, sans-serif" font-size="11" font-weight="900" fill="#fff" text-anchor="middle">POST /api/generate</text>
  <text x="555" y="134" font-family="Arial, sans-serif" font-size="10.5" fill="#333" text-anchor="middle">JSON payload</text>
  <text x="555" y="150" font-family="Arial, sans-serif" font-size="10.5" fill="#333" text-anchor="middle">CORS → localhost</text>
  <text x="555" y="168" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">2 MB body limit</text>

  <!-- step 3→4 arrow -->
  <line x1="650" y1="135" x2="678" y2="135" stroke="#000" stroke-width="3.5" marker-end="url(#fat-arr)"/>

  <!-- Step 4 -->
  <rect x="680" y="80" width="300" height="110" fill="#fff" stroke="#000" stroke-width="4" rx="6" filter="url(#fshadow)"/>
  <rect x="680" y="80" width="300" height="34" fill="#9c27b0" stroke="#000" stroke-width="3.5" rx="5"/>
  <circle cx="704" cy="97" r="12" fill="#000"/>
  <text x="704" y="102" font-family="'Arial Black', Impact, sans-serif" font-size="13" fill="#f5c800" text-anchor="middle">4</text>
  <text x="830" y="101" font-family="'Arial Black', Impact, sans-serif" font-size="11" font-weight="900" fill="#fff" text-anchor="middle">sanitizeText()</text>
  <text x="830" y="134" font-family="Arial, sans-serif" font-size="10.5" fill="#333" text-anchor="middle">strip HTML tags · dangerous chars</text>
  <text x="830" y="150" font-family="Arial, sans-serif" font-size="10.5" fill="#333" text-anchor="middle">clamp slides to [3..32]</text>
  <text x="830" y="168" font-family="Arial, sans-serif" font-size="10" fill="#9c27b0" text-anchor="middle">server-side safety net</text>

  <!-- ======================================================= -->
  <!-- Divider line between row 1 and row 2 -->
  <line x1="20" y1="262" x2="980" y2="262" stroke="#000" stroke-width="2" stroke-dasharray="8 4" opacity="0.3"/>

  <!-- step 4 down arrow to step 5 -->
  <line x1="830" y1="195" x2="830" y2="278" stroke="#000" stroke-width="3.5" marker-end="url(#fat-arr)"/>

  <!-- ======== ROW 2: Steps 5-8 ======== -->
  <!-- Step 5 -->
  <rect x="680" y="280" width="300" height="110" fill="#fff" stroke="#000" stroke-width="4" rx="6" filter="url(#fshadow)"/>
  <rect x="680" y="280" width="300" height="34" fill="#9c27b0" stroke="#000" stroke-width="3.5" rx="5"/>
  <circle cx="704" cy="297" r="12" fill="#000"/>
  <text x="704" y="302" font-family="'Arial Black', Impact, sans-serif" font-size="13" fill="#f5c800" text-anchor="middle">5</text>
  <text x="830" y="301" font-family="'Arial Black', Impact, sans-serif" font-size="10" font-weight="900" fill="#fff" text-anchor="middle">buildSystemPrompt()</text>
  <text x="830" y="333" font-family="Arial, sans-serif" font-size="10.5" fill="#333" text-anchor="middle">injects theme tokens · SVG rules</text>
  <text x="830" y="349" font-family="Arial, sans-serif" font-size="10.5" fill="#333" text-anchor="middle">26-topic template fallback</text>
  <text x="830" y="367" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">density constraints baked in</text>

  <!-- step 5→6 arrow -->
  <line x1="678" y1="335" x2="650" y2="335" stroke="#000" stroke-width="3.5" marker-end="url(#fat-arr)"/>

  <!-- Step 6: Groq Inference -->
  <rect x="460" y="280" width="190" height="110" fill="#000" stroke="#000" stroke-width="4" rx="6" filter="url(#fshadow)"/>
  <rect x="460" y="280" width="190" height="34" fill="#4caf50" stroke="#000" stroke-width="3.5" rx="5"/>
  <circle cx="484" cy="297" r="12" fill="#f5c800"/>
  <text x="484" y="302" font-family="'Arial Black', Impact, sans-serif" font-size="13" fill="#000" text-anchor="middle">6</text>
  <text x="558" y="301" font-family="'Arial Black', Impact, sans-serif" font-size="11" font-weight="900" fill="#000" text-anchor="middle">Groq Inference</text>
  <text x="555" y="334" font-family="Arial, sans-serif" font-size="10.5" fill="#aaa" text-anchor="middle">llama-3.1-8b-instant</text>
  <text x="555" y="351" font-family="Arial, sans-serif" font-size="10.5" fill="#aaa" text-anchor="middle">8192 token context</text>
  <text x="555" y="370" font-family="'Arial Black', Impact, sans-serif" font-size="13" fill="#f5c800" text-anchor="middle">~1–3s ⚡</text>

  <!-- step 6→7 arrow -->
  <line x1="458" y1="335" x2="432" y2="335" stroke="#000" stroke-width="3.5" marker-end="url(#fat-arr)"/>

  <!-- Step 7 -->
  <rect x="240" y="280" width="190" height="110" fill="#fff" stroke="#000" stroke-width="4" rx="6" filter="url(#fshadow)"/>
  <rect x="240" y="280" width="190" height="34" fill="#9c27b0" stroke="#000" stroke-width="3.5" rx="5"/>
  <circle cx="264" cy="297" r="12" fill="#000"/>
  <text x="264" y="302" font-family="'Arial Black', Impact, sans-serif" font-size="13" fill="#f5c800" text-anchor="middle">7</text>
  <text x="338" y="301" font-family="'Arial Black', Impact, sans-serif" font-size="12" font-weight="900" fill="#fff" text-anchor="middle">Parse + Strip</text>
  <text x="335" y="334" font-family="Arial, sans-serif" font-size="10.5" fill="#333" text-anchor="middle">strip markdown fences</text>
  <text x="335" y="350" font-family="Arial, sans-serif" font-size="10.5" fill="#333" text-anchor="middle">JSON.parse()</text>
  <text x="335" y="367" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">bullets.slice(0,4)</text>

  <!-- step 7→8 arrow -->
  <line x1="238" y1="335" x2="212" y2="335" stroke="#000" stroke-width="3.5" marker-end="url(#fat-arr)"/>

  <!-- Step 8 -->
  <rect x="20" y="280" width="190" height="110" fill="#fff" stroke="#000" stroke-width="4" rx="6" filter="url(#fshadow)"/>
  <rect x="20" y="280" width="190" height="34" fill="#9c27b0" stroke="#000" stroke-width="3.5" rx="5"/>
  <circle cx="44" cy="297" r="12" fill="#000"/>
  <text x="44" y="302" font-family="'Arial Black', Impact, sans-serif" font-size="13" fill="#f5c800" text-anchor="middle">8</text>
  <text x="118" y="301" font-family="'Arial Black', Impact, sans-serif" font-size="12" font-weight="900" fill="#fff" text-anchor="middle">validateSVG()</text>
  <text x="115" y="334" font-family="Arial, sans-serif" font-size="10.5" fill="#e8001c" text-anchor="middle">reject &lt;script&gt;</text>
  <text x="115" y="350" font-family="Arial, sans-serif" font-size="10.5" fill="#e8001c" text-anchor="middle">reject on* attrs</text>
  <text x="115" y="368" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">buildSVG() fallback</text>

  <!-- step 8 down arrow to row 3 -->
  <line x1="115" y1="395" x2="115" y2="415" stroke="#000" stroke-width="3.5" marker-end="url(#fat-arr)"/>

  <!-- ======== ROW 3: Steps 9-11 ======== -->
  <!-- Row 3 background strip -->
  <rect x="20" y="417" width="960" height="110" rx="6" fill="none"/>

  <!-- Step 9 -->
  <rect x="20" y="417" width="190" height="110" fill="#fff" stroke="#000" stroke-width="4" rx="6" filter="url(#fshadow)"/>
  <rect x="20" y="417" width="190" height="34" fill="#00bcd4" stroke="#000" stroke-width="3.5" rx="5"/>
  <circle cx="44" cy="434" r="12" fill="#000"/>
  <text x="44" y="439" font-family="'Arial Black', Impact, sans-serif" font-size="13" fill="#f5c800" text-anchor="middle">9</text>
  <text x="118" y="438" font-family="'Arial Black', Impact, sans-serif" font-size="12" font-weight="900" fill="#000" text-anchor="middle">JSON Response</text>
  <text x="115" y="471" font-family="Arial, sans-serif" font-size="10.5" fill="#333" text-anchor="middle">{ success · slides[]</text>
  <text x="115" y="487" font-family="Arial, sans-serif" font-size="10.5" fill="#333" text-anchor="middle">theme_config }</text>
  <text x="115" y="505" font-family="Arial, sans-serif" font-size="10" fill="#4caf50" text-anchor="middle">200 OK ✓</text>

  <!-- step 9→10 arrow -->
  <line x1="210" y1="472" x2="238" y2="472" stroke="#000" stroke-width="3.5" marker-end="url(#fat-arr)"/>

  <!-- Step 10 -->
  <rect x="240" y="417" width="190" height="110" fill="#fff" stroke="#000" stroke-width="4" rx="6" filter="url(#fshadow)"/>
  <rect x="240" y="417" width="190" height="34" fill="#00bcd4" stroke="#000" stroke-width="3.5" rx="5"/>
  <circle cx="264" cy="434" r="12" fill="#000"/>
  <text x="264" y="439" font-family="'Arial Black', Impact, sans-serif" font-size="12" fill="#f5c800" text-anchor="middle">10</text>
  <text x="338" y="438" font-family="'Arial Black', Impact, sans-serif" font-size="11" font-weight="900" fill="#000" text-anchor="middle">Hydrate Viewer</text>
  <text x="335" y="471" font-family="Arial, sans-serif" font-size="10.5" fill="#333" text-anchor="middle">render slides · SVG</text>
  <text x="335" y="487" font-family="Arial, sans-serif" font-size="10.5" fill="#333" text-anchor="middle">thumbnails · notes</text>
  <text x="335" y="505" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">keyboard nav active</text>

  <!-- step 10→11 arrow -->
  <line x1="430" y1="472" x2="458" y2="472" stroke="#000" stroke-width="3.5" marker-end="url(#fat-arr)"/>

  <!-- Step 11 -->
  <rect x="460" y="417" width="510" height="110" fill="#000" stroke="#000" stroke-width="4" rx="6" filter="url(#fshadow)"/>
  <rect x="460" y="417" width="510" height="34" fill="#ff5722" stroke="#000" stroke-width="3.5" rx="5"/>
  <circle cx="484" cy="434" r="12" fill="#f5c800"/>
  <text x="484" y="439" font-family="'Arial Black', Impact, sans-serif" font-size="12" fill="#000" text-anchor="middle">11</text>
  <text x="714" y="438" font-family="'Arial Black', Impact, sans-serif" font-size="14" font-weight="900" fill="#fff" text-anchor="middle">EXPORT PDF 📄</text>
  <text x="714" y="471" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">html2canvas at 2× scale → JPEG →</text>
  <text x="714" y="487" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">jsPDF at 13.33 × 7.5 in (PowerPoint widescreen)</text>
  <text x="714" y="505" font-family="'Arial Black', Impact, sans-serif" font-size="12" fill="#f5c800" text-anchor="middle">BOOM — one click. done. go home.</text>

  <!-- BOOM starburst -->
  <polygon points="940,430 950,455 977,448 962,470 982,480 958,482 964,508 944,492 934,516 924,492 904,508 910,482 886,480 906,470 891,448 918,455"
           fill="#f5c800" stroke="#000" stroke-width="3" transform="rotate(10,935,475)"/>
  <text x="936" y="476" font-family="'Arial Black', Impact, sans-serif" font-size="12" font-weight="900"
        fill="#000" text-anchor="middle" transform="rotate(10,936,476)">BOOM!</text>

  <!-- Zone labels -->
  <rect x="5" y="544" width="990" height="11" rx="0" fill="#000" opacity="0.06"/>
  <text x="115" y="553" font-family="'Arial Black', Impact, sans-serif" font-size="9" fill="#00838f" text-anchor="middle" letter-spacing="2">BROWSER</text>
  <text x="500" y="553" font-family="'Arial Black', Impact, sans-serif" font-size="9" fill="#6a1b9a" text-anchor="middle" letter-spacing="2">SERVER</text>
  <text x="840" y="553" font-family="'Arial Black', Impact, sans-serif" font-size="9" fill="#bf360c" text-anchor="middle" letter-spacing="2">BROWSER</text>
</svg>

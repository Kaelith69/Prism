<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="100%">
  <defs>
    <marker id="darr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="darr-ok" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
    <marker id="darr-err" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#fb7185"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1000" height="520" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="500" y="36" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold"
        fill="#e2e8f0" text-anchor="middle" letter-spacing="2">DATA FLOW</text>
  <line x1="200" y1="46" x2="800" y2="46" stroke="#1e293b" stroke-width="1"/>

  <!-- helper macro: step boxes drawn manually per step -->
  <!-- Step 1: User Input -->
  <rect x="30" y="70" width="140" height="72" rx="8" fill="#0d1b2e" stroke="#1e4a7a" stroke-width="1.5"/>
  <circle cx="56" cy="92" r="10" fill="#1e40af"/>
  <text x="56" y="96" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">1</text>
  <text x="100" y="92" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">User Input</text>
  <text x="100" y="108" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">topic · theme ·</text>
  <text x="100" y="122" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">slide count · context</text>

  <!-- Arrow 1→2 -->
  <line x1="170" y1="106" x2="200" y2="106" stroke="#64748b" stroke-width="1.8" marker-end="url(#darr)"/>

  <!-- Step 2: Client Validate -->
  <rect x="200" y="70" width="140" height="72" rx="8" fill="#0d1b2e" stroke="#1e4a7a" stroke-width="1.5"/>
  <circle cx="226" cy="92" r="10" fill="#1e40af"/>
  <text x="226" y="96" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
  <text x="270" y="92" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Client Validate</text>
  <text x="270" y="108" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">title required ·</text>
  <text x="270" y="122" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">min ≤ max check</text>

  <!-- validation error path (down from step 2) -->
  <line x1="270" y1="142" x2="270" y2="180" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#darr-err)"/>
  <text x="278" y="168" font-family="'Courier New', Courier, monospace" font-size="9" fill="#fb7185">invalid</text>
  <rect x="200" y="180" width="140" height="36" rx="6" fill="#1f0a0a" stroke="#7f1d1d" stroke-width="1"/>
  <text x="270" y="197" font-family="'Courier New', Courier, monospace" font-size="10" fill="#fb7185" text-anchor="middle">red border · block</text>
  <text x="270" y="210" font-family="'Courier New', Courier, monospace" font-size="10" fill="#64748b" text-anchor="middle">no request sent</text>

  <!-- Arrow 2→3 (valid path) -->
  <line x1="340" y1="106" x2="370" y2="106" stroke="#4ade80" stroke-width="1.8" marker-end="url(#darr-ok)"/>
  <text x="354" y="99" font-family="'Courier New', Courier, monospace" font-size="9" fill="#4ade80" text-anchor="middle">valid</text>

  <!-- Step 3: POST /api/generate -->
  <rect x="370" y="70" width="150" height="72" rx="8" fill="#0d1b2e" stroke="#1e4a7a" stroke-width="1.5"/>
  <circle cx="396" cy="92" r="10" fill="#1e40af"/>
  <text x="396" y="96" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">3</text>
  <text x="445" y="88" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">POST /api/generate</text>
  <text x="445" y="105" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">JSON payload · CORS</text>
  <text x="445" y="120" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">restricted to localhost</text>

  <!-- Arrow 3→4 -->
  <line x1="520" y1="106" x2="550" y2="106" stroke="#64748b" stroke-width="1.8" marker-end="url(#darr)"/>

  <!-- Step 4: Server Sanitize -->
  <rect x="550" y="70" width="150" height="72" rx="8" fill="#1a0f3a" stroke="#3b2a6e" stroke-width="1.5"/>
  <circle cx="576" cy="92" r="10" fill="#6d28d9"/>
  <text x="576" y="96" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">4</text>
  <text x="625" y="88" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">sanitizeText()</text>
  <text x="625" y="105" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">strip HTML · clamp</text>
  <text x="625" y="120" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">slides [3..32]</text>

  <!-- Arrow 4→5 -->
  <line x1="700" y1="106" x2="730" y2="106" stroke="#64748b" stroke-width="1.8" marker-end="url(#darr)"/>

  <!-- Step 5: buildSystemPrompt -->
  <rect x="730" y="70" width="240" height="72" rx="8" fill="#1a0f3a" stroke="#3b2a6e" stroke-width="1.5"/>
  <circle cx="756" cy="92" r="10" fill="#6d28d9"/>
  <text x="756" y="96" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">5</text>
  <text x="850" y="88" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">buildSystemPrompt()</text>
  <text x="850" y="105" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">theme tokens · visual rules</text>
  <text x="850" y="120" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">26-topic template fallback</text>

  <!-- Arrow 5 down → Step 6 -->
  <line x1="850" y1="142" x2="850" y2="172" stroke="#64748b" stroke-width="1.8" marker-end="url(#darr)"/>

  <!-- Step 6: Groq Inference -->
  <rect x="730" y="172" width="240" height="72" rx="8" fill="#0a2417" stroke="#166534" stroke-width="1.5"/>
  <circle cx="756" cy="194" r="10" fill="#15803d"/>
  <text x="756" y="198" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">6</text>
  <text x="850" y="190" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Groq Inference</text>
  <text x="850" y="208" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">llama-3.1-8b-instant</text>
  <text x="850" y="223" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#4ade80" text-anchor="middle">~1–3s · JSON schema</text>

  <!-- Groq error path -->
  <line x1="970" y1="208" x2="1000" y2="208" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="3 2" opacity="0"/>
  <!-- Groq → Step 7 -->
  <line x1="850" y1="244" x2="850" y2="274" stroke="#64748b" stroke-width="1.8" marker-end="url(#darr)"/>

  <!-- Step 7: Parse & Strip -->
  <rect x="730" y="274" width="240" height="72" rx="8" fill="#1a0f3a" stroke="#3b2a6e" stroke-width="1.5"/>
  <circle cx="756" cy="296" r="10" fill="#6d28d9"/>
  <text x="756" y="300" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">7</text>
  <text x="850" y="292" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Parse + Strip Fences</text>
  <text x="850" y="309" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">JSON.parse · slice bullets</text>
  <text x="850" y="324" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">to 4 · validateSVG()</text>

  <!-- Step 7 → Step 8 -->
  <line x1="730" y1="310" x2="700" y2="310" stroke="#64748b" stroke-width="1.8" marker-end="url(#darr)"/>

  <!-- Step 8: buildSVG fallback -->
  <rect x="550" y="274" width="150" height="72" rx="8" fill="#1a0f3a" stroke="#3b2a6e" stroke-width="1.5"/>
  <circle cx="576" cy="296" r="10" fill="#6d28d9"/>
  <text x="576" y="300" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">8</text>
  <text x="625" y="292" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">buildSVG()</text>
  <text x="625" y="309" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">local fallback chart</text>
  <text x="625" y="324" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">if LLM SVG invalid</text>

  <!-- Step 8 → Step 9 -->
  <line x1="550" y1="310" x2="520" y2="310" stroke="#64748b" stroke-width="1.8" marker-end="url(#darr)"/>

  <!-- Step 9: JSON Response -->
  <rect x="370" y="274" width="150" height="72" rx="8" fill="#0d1b2e" stroke="#1e4a7a" stroke-width="1.5"/>
  <circle cx="396" cy="296" r="10" fill="#1e40af"/>
  <text x="396" y="300" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">9</text>
  <text x="445" y="292" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">JSON Response</text>
  <text x="445" y="309" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">{ success · slides[]</text>
  <text x="445" y="324" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">theme_config }</text>

  <!-- Step 9 → Step 10 -->
  <line x1="370" y1="310" x2="340" y2="310" stroke="#64748b" stroke-width="1.8" marker-end="url(#darr)"/>

  <!-- Step 10: Hydrate Viewer -->
  <rect x="200" y="274" width="140" height="72" rx="8" fill="#0d1b2e" stroke="#1e4a7a" stroke-width="1.5"/>
  <circle cx="226" cy="296" r="10" fill="#1e40af"/>
  <text x="226" y="300" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">10</text>
  <text x="270" y="292" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Hydrate Viewer</text>
  <text x="270" y="309" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">render slides · SVG</text>
  <text x="270" y="324" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">thumbnails · notes</text>

  <!-- Step 10 → Step 11 -->
  <line x1="200" y1="310" x2="170" y2="310" stroke="#64748b" stroke-width="1.8" marker-end="url(#darr)"/>

  <!-- Step 11: PDF Export -->
  <rect x="30" y="274" width="140" height="72" rx="8" fill="#0d1b2e" stroke="#1e4a7a" stroke-width="1.5"/>
  <circle cx="56" cy="296" r="10" fill="#1e40af"/>
  <text x="56" y="300" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">11</text>
  <text x="100" y="292" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">PDF Export</text>
  <text x="100" y="308" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">html2canvas 2× ·</text>
  <text x="100" y="322" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#64748b" text-anchor="middle">jsPDF 13.33×7.5in</text>

  <!-- Section labels -->
  <rect x="30" y="380" width="480" height="24" rx="5" fill="#0d1b2e" opacity="0.6"/>
  <text x="270" y="396" font-family="'Courier New', Courier, monospace" font-size="10" fill="#38bdf8" text-anchor="middle" letter-spacing="1">BROWSER</text>

  <rect x="545" y="380" width="425" height="24" rx="5" fill="#12101f" opacity="0.6"/>
  <text x="757" y="396" font-family="'Courier New', Courier, monospace" font-size="10" fill="#a78bfa" text-anchor="middle" letter-spacing="1">SERVER + GROQ</text>

  <!-- Divider line between zones -->
  <line x1="525" y1="60" x2="525" y2="400" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Legend -->
  <line x1="30" y1="450" x2="1000" y2="450" stroke="#1e293b" stroke-width="1"/>
  <text x="30" y="468" font-family="'Courier New', Courier, monospace" font-size="10" fill="#475569">── happy path</text>
  <line x1="175" y1="464" x2="215" y2="464" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="220" y="468" font-family="'Courier New', Courier, monospace" font-size="10" fill="#475569">error / rejection path</text>
  <circle cx="420" cy="464" r="5" fill="#15803d"/>
  <text x="430" y="468" font-family="'Courier New', Courier, monospace" font-size="10" fill="#475569">external API call</text>
  <circle cx="580" cy="464" r="5" fill="#6d28d9"/>
  <text x="590" y="468" font-family="'Courier New', Courier, monospace" font-size="10" fill="#475569">server-side processing</text>
  <circle cx="760" cy="464" r="5" fill="#1e40af"/>
  <text x="770" y="468" font-family="'Courier New', Courier, monospace" font-size="10" fill="#475569">browser-side step</text>
</svg>

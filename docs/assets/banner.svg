<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 240" width="100%">
  <defs>
    <!-- Halftone dot pattern -->
    <pattern id="dots" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="2.2" fill="#f5c800" opacity="0.35"/>
    </pattern>
    <!-- Pop shadow filter -->
    <filter id="pop-shadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="4" dy="4" stdDeviation="0" flood-color="#000000" flood-opacity="1"/>
    </filter>
  </defs>

  <!-- Background: halftone yellow -->
  <rect width="1000" height="240" fill="#fffde7"/>
  <rect width="1000" height="240" fill="url(#dots)"/>

  <!-- Thick outer border -->
  <rect x="6" y="6" width="988" height="228" fill="none" stroke="#000" stroke-width="5" rx="4"/>

  <!-- Big red panel left -->
  <rect x="6" y="6" width="340" height="228" fill="#e8001c" stroke="#000" stroke-width="4"/>

  <!-- PRISM lettering -->
  <text x="175" y="110" font-family="'Arial Black', 'Impact', sans-serif" font-size="82" font-weight="900"
        fill="#fff" text-anchor="middle" stroke="#000" stroke-width="4" paint-order="stroke">PRISM</text>
  <text x="175" y="148" font-family="'Arial Black', 'Impact', sans-serif" font-size="17" font-weight="900"
        fill="#f5c800" text-anchor="middle" letter-spacing="4" stroke="#000" stroke-width="1.5" paint-order="stroke">PRESENTATION STUDIO</text>

  <!-- Stars on red panel -->
  <polygon points="50,40 55,55 70,55 59,64 63,79 50,70 37,79 41,64 30,55 45,55" fill="#f5c800" stroke="#000" stroke-width="2"/>
  <polygon points="300,170 303,180 313,180 305,186 308,196 300,190 292,196 295,186 287,180 297,180" fill="#f5c800" stroke="#000" stroke-width="1.5"/>
  <polygon points="80,190 84,202 97,202 87,210 91,222 80,214 69,222 73,210 63,202 76,202" fill="#fff" stroke="#000" stroke-width="1.5" opacity="0.5"/>

  <!-- Starburst behind "AI" -->
  <polygon points="460,60 470,100 510,90 485,120 520,135 480,140 490,180 460,155 430,180 440,140 400,135 435,120 410,90 450,100"
           fill="#f5c800" stroke="#000" stroke-width="3"/>
  <text x="462" y="128" font-family="'Arial Black', Impact, sans-serif" font-size="22" font-weight="900"
        fill="#000" text-anchor="middle" stroke="#000" stroke-width="1">AI</text>

  <!-- Main tagline area -->
  <rect x="346" y="6" width="648" height="228" fill="#ffffff"/>

  <!-- Speech bubble for tagline -->
  <rect x="400" y="30" width="560" height="65" rx="12" fill="#fff" stroke="#000" stroke-width="3.5" filter="url(#pop-shadow)"/>
  <!-- bubble tail -->
  <polygon points="430,95 420,120 460,95" fill="#fff" stroke="#000" stroke-width="3"/>
  <text x="680" y="65" font-family="'Arial Black', Impact, sans-serif" font-size="15" font-weight="900"
        fill="#000" text-anchor="middle">TYPE A TOPIC. PICK A THEME.</text>
  <text x="680" y="87" font-family="'Arial Black', Impact, sans-serif" font-size="15" font-weight="900"
        fill="#e8001c" text-anchor="middle">GET A FULL DECK. THAT'S IT.</text>

  <!-- Tech badges: comic style -->
  <g transform="translate(400,140)">
    <rect x="0" y="0" width="90" height="30" fill="#00bcd4" stroke="#000" stroke-width="2.5" rx="4" filter="url(#pop-shadow)"/>
    <text x="45" y="20" font-family="'Arial Black', Impact, sans-serif" font-size="13" font-weight="900" fill="#000" text-anchor="middle">Node.js</text>

    <rect x="100" y="0" width="90" height="30" fill="#9c27b0" stroke="#000" stroke-width="2.5" rx="4" filter="url(#pop-shadow)"/>
    <text x="145" y="20" font-family="'Arial Black', Impact, sans-serif" font-size="13" font-weight="900" fill="#fff" text-anchor="middle">Express</text>

    <rect x="200" y="0" width="90" height="30" fill="#4caf50" stroke="#000" stroke-width="2.5" rx="4" filter="url(#pop-shadow)"/>
    <text x="245" y="20" font-family="'Arial Black', Impact, sans-serif" font-size="13" font-weight="900" fill="#fff" text-anchor="middle">Groq LLM</text>

    <rect x="300" y="0" width="80" height="30" fill="#ff5722" stroke="#000" stroke-width="2.5" rx="4" filter="url(#pop-shadow)"/>
    <text x="340" y="20" font-family="'Arial Black', Impact, sans-serif" font-size="13" font-weight="900" fill="#fff" text-anchor="middle">jsPDF</text>

    <rect x="390" y="0" width="80" height="30" fill="#f5c800" stroke="#000" stroke-width="2.5" rx="4" filter="url(#pop-shadow)"/>
    <text x="430" y="20" font-family="'Arial Black', Impact, sans-serif" font-size="13" font-weight="900" fill="#000" text-anchor="middle">SVG</text>
  </g>

  <!-- ZAP starburst bottom right -->
  <polygon points="930,155 940,185 970,170 952,198 982,200 958,215 975,240 948,228 940,255 928,228 900,240 915,215 888,200 918,198 900,170 930,185"
           fill="#f5c800" stroke="#000" stroke-width="3"/>
  <text x="934" y="205" font-family="'Arial Black', Impact, sans-serif" font-size="16" font-weight="900"
        fill="#000" text-anchor="middle" transform="rotate(-15,934,205)">ZAP!</text>

  <!-- Panel divider line -->
  <line x1="346" y1="6" x2="346" y2="234" stroke="#000" stroke-width="4"/>
</svg>

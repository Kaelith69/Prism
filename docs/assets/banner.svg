<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 220" width="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="prism-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa" />
      <stop offset="50%" style="stop-color:#38bdf8" />
      <stop offset="100%" style="stop-color:#fb7185" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="220" fill="url(#bg-grad)"/>

  <!-- Prism triangle decoration -->
  <polygon points="870,30 940,160 800,160" fill="none" stroke="url(#prism-grad)" stroke-width="2" opacity="0.5"/>
  <polygon points="880,55 930,145 830,145" fill="none" stroke="url(#prism-grad)" stroke-width="1" opacity="0.3"/>

  <!-- Spectral light rays -->
  <line x1="940" y1="160" x2="1000" y2="130" stroke="#fb7185" stroke-width="1.5" opacity="0.4"/>
  <line x1="940" y1="160" x2="1000" y2="155" stroke="#fb923c" stroke-width="1.5" opacity="0.4"/>
  <line x1="940" y1="160" x2="1000" y2="175" stroke="#facc15" stroke-width="1.5" opacity="0.4"/>
  <line x1="940" y1="160" x2="1000" y2="195" stroke="#4ade80" stroke-width="1.5" opacity="0.4"/>
  <line x1="940" y1="160" x2="1000" y2="210" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="40" x2="750" y2="40" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="80" x2="750" y2="80" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="120" x2="750" y2="120" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="160" x2="750" y2="160" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>

  <!-- PRISM text with gradient -->
  <text x="80" y="118" font-family="'Courier New', Courier, monospace" font-size="72" font-weight="900"
        fill="url(#prism-grad)" filter="url(#glow)" letter-spacing="8">PRISM</text>

  <!-- Subtitle -->
  <text x="82" y="148" font-family="'Courier New', Courier, monospace" font-size="14"
        fill="#94a3b8" letter-spacing="3">AI PRESENTATION STUDIO</text>

  <!-- Divider -->
  <line x1="82" y1="162" x2="500" y2="162" stroke="#38bdf8" stroke-width="0.8" opacity="0.4"/>

  <!-- Tag badges -->
  <g font-family="'Courier New', Courier, monospace" font-size="11" fill="#94a3b8">
    <rect x="82" y="172" width="68" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="116" y="187" text-anchor="middle" fill="#38bdf8">Node.js</text>

    <rect x="158" y="172" width="58" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="187" y="187" text-anchor="middle" fill="#a78bfa">Express</text>

    <rect x="224" y="172" width="70" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="259" y="187" text-anchor="middle" fill="#fb7185">Groq LLM</text>

    <rect x="302" y="172" width="52" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="328" y="187" text-anchor="middle" fill="#4ade80">jsPDF</text>

    <rect x="362" y="172" width="50" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="387" y="187" text-anchor="middle" fill="#facc15">SVG</text>
  </g>
</svg>

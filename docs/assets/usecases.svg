  <text x="828" y="162" font-family="'Courier New', Courier, monospace" font-size="10" fill="#94a3b8">▸ Portfolio decks</text>
  <text x="828" y="181" font-family="'Courier New', Courier, monospace" font-size="10" fill="#94a3b8">▸ Side project pitches</text>
  <text x="828" y="200" font-family="'Courier New', Courier, monospace" font-size="10" fill="#94a3b8">▸ Hackathon slides</text>
  <text x="828" y="219" font-family="'Courier New', Courier, monospace" font-size="10" fill="#94a3b8">▸ Talk proposals</text>
  <text x="828" y="238" font-family="'Courier New', Courier, monospace" font-size="10" fill="#94a3b8">▸ Cyberpunk theme</text>
  <text x="890" y="280" font-family="'Courier New', Courier, monospace" font-size="9" fill="#475569" text-anchor="middle">theme: cyberpunk</text>

  <!-- Bottom note -->
  <text x="500" y="320" font-family="'Courier New', Courier, monospace" font-size="10" fill="#334155"
        text-anchor="middle">all use cases produce a standard 16:9 widescreen PDF · export in one click</text>
</svg>

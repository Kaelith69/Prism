  <text x="638" y="219" font-family="'Courier New', Courier, monospace" font-size="10" fill="#94a3b8">▸ Colorblind-safe</text>
  <text x="638" y="238" font-family="'Courier New', Courier, monospace" font-size="10" fill="#94a3b8">▸ Kids theme option</text>
  <text x="702" y="280" font-family="'Courier New', Courier, monospace" font-size="9" fill="#475569" text-anchor="middle">theme: colorful / kids</text>

  <!-- Card 5: Personal -->
  <rect x="810" y="65" width="160" height="235" rx="10" fill="#0d1b2e" stroke="#1e3a5f" stroke-width="1.5"/>
